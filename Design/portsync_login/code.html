<body class="bg-background min-h-screen flex items-center justify-center p-4">
<!-- Login Container -->
<main class="w-full max-w-[480px]">
<!-- Header Section -->
<div class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg text-primary mb-sm">PortSync</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xs">Smart Transit &amp; Resource Synchronization Platform</p>
<p class="font-label-sm text-label-sm text-outline">Designed for Next-Generation Port Operations (Vadhvan Port Use Case)</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-[12px] border border-outline-variant shadow-[0px_4px_12px_rgba(0,0,0,0.05)] p-lg">
<form action="#" class="flex flex-col gap-lg" method="POST">
<div class="text-center mb-md">
<h2 class="font-headline-sm text-headline-sm text-primary">Sign In to Dashboard</h2>
</div>
<!-- Username Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="username">Username / Operator ID</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="person">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-[#CBD5E1] rounded-lg bg-surface-container-lowest font-body-sm text-body-sm text-primary placeholder-outline focus:outline-none focus:ring-0 focus:border-secondary-container focus:shadow-[0_0_0_3px_rgba(45,91,255,0.2)] transition-shadow duration-200" id="username" name="username" placeholder="Enter your Operator ID" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-sm" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-[#CBD5E1] rounded-lg bg-surface-container-lowest font-body-sm text-body-sm text-primary placeholder-outline focus:outline-none focus:ring-0 focus:border-secondary-container focus:shadow-[0_0_0_3px_rgba(45,91,255,0.2)] transition-shadow duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-between mt-xs">
<div class="flex items-center">
<input class="h-4 w-4 text-secondary-container focus:ring-secondary-container border-[#CBD5E1] rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                            Remember session
                        </label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md text-secondary-container hover:text-secondary hover:underline transition-colors" href="#">
                            Forgot password?
                        </a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-2 px-4 border border-transparent rounded-lg shadow-[0_1px_0_0_rgba(0,0,0,0.1)] font-label-md text-label-md text-on-primary bg-secondary-container hover:bg-secondary hover:shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary-container transition-all duration-200 mt-md h-10" type="submit">
                    Sign In
                    <span class="material-symbols-outlined ml-2 text-[18px]" data-icon="login">login</span>
</button>
</form>
<div class="mt-lg pt-lg border-t border-outline-variant text-center">
<p class="font-body-sm text-body-sm text-outline flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="security">security</span>
                    Secure Encrypted Connection
                </p>
</div>
</div>
